name: War Canary
run-name: "Introspect Runner on ${{ github.repository }} by ${{ github.actor }} with ${{ github.event_name }} (Attempt ${{ github.run_attempt }})."

on:
  push:
  workflow_call:
    inputs:
      host-info:
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      host-info:
        required: false
        type: boolean
        default: true
        description: "Should we probe for Hosted Infra? This is useful for debugging issues with Hosted Infra."


defaults:
  run:
    shell: zsh -l {0}

jobs:

  canary-flight-job:
    runs-on: [self-hosted, peep]
    timeout-minutes: 3

    steps:

      - name: Hosted Infra Snapshot
        if: inputs.host-info
        run: |
          echo "::group::🖥️ Hosted Infra Fingerprint"
          echo "::notice title=Event::$GITHUB_EVENT_NAME"
          echo "::notice title=Branch::$GITHUB_REF_NAME"
          echo "::notice title=OS:: $(cat /etc/issue || true)"
          echo "::notice title=Kernel::$(uname -v || true)"
          echo "::notice title=Memory::$(free -hg || true)"
          echo "::notice title=CPU::$(nproc) cores, $(lscpu | grep 'Model name' | uniq || true)"
          echo "::notice title=Git::$(git --version || true)"
          echo "::notice title=GitHub CLI::$(gh version || true)"
          echo "::notice title=Runner::${{ runner.name }} ($( hostname -s ))"
          echo "::endgroup::"

  sdk-managers-job:
    needs: canary-flight-job
    runs-on: [ self-hosted, peep ]
    timeout-minutes: 11
    outputs:
      sdkman-failed: ${{ steps.sdkman.outputs.failed }}
      sdkman-upgraded: ${{ steps.sdkman-upgrade.outputs.upgraded }}
      conda-failed: ${{ steps.conda.outputs.failed }}
      conda-upgraded: ${{ steps.conda-upgrade.outputs.upgraded }}

    steps:

      - name: Detect SDKMAN
        id: sdkman
        uses: Mimis-Gildi/fluffle/.github/actions/runner-detect-sdkman@main
        with:
          sdkman-version: '5.22.4'
          sdkman-native: '0.7.32'

      - name: Upgrade SDKMAN
        id: sdkman-upgrade
        if: steps.sdkman.outputs.failed == 'true'
        uses: Mimis-Gildi/fluffle/.github/actions/runner-upgrade-sdkman@main


      - name: Introspect Conda
        id: conda
        uses: Mimis-Gildi/fluffle/.github/actions/runner-detect-conda@main
        with:
          conda-version: '26.3.1'
          mamba-version: '2.5.0'
          python-version: '3.12.13'

      - name: Upgrade Conda
        id: conda-upgrade
        if: steps.conda.outputs.failed == 'true'
        uses: Mimis-Gildi/fluffle/.github/actions/runner-upgrade-conda@main

  ruby-job:
    needs: canary-flight-job
    runs-on: [ self-hosted, peep ]
    timeout-minutes: 2
    outputs:
      failed: ${{ steps.ruby.outputs.failed }}

    steps:
      - name: Introspect Ruby
        id: ruby
        uses: Mimis-Gildi/fluffle/.github/actions/runner-detect-ruby@main
        with:
          ruby-version: '3.3.5'
          gems-version: '3.5.16'
          bundler-version: '2.7.2'


  java-manager-job:
    needs: sdk-managers-job
    runs-on: [ self-hosted, peep ]
    timeout-minutes: 5
    outputs:
      failed: ${{ steps.java.outputs.failed }}
      upgraded: ${{ steps.java-upgrade.outputs.upgraded }}

    steps:

      - name: Introspect Java
        id: java
        uses: Mimis-Gildi/fluffle/.github/actions/runner-detect-java@main

      - name: Upgrade Java
        id: java-upgrade
        if: steps.java.outputs.failed == 'true'
        uses: Mimis-Gildi/fluffle/.github/actions/runner-upgrade-java@main


  sdk-candidates:
    needs: sdk-managers-job
    runs-on: [self-hosted, peep]
    timeout-minutes: 7
    strategy:
      matrix:
        candidate: [gradle, kotlin, kobweb, maven, sbt, scala]

    steps:

      - name: Detect ${{ matrix.candidate }}
        id: detect
        uses: Mimis-Gildi/fluffle/.github/actions/runner-detect-sdk-candidate@main
        with:
          candidate: ${{ matrix.candidate }}

      - name: Upgrade ${{ matrix.candidate }}
        if: steps.detect.outputs.failed == 'true'
        uses: Mimis-Gildi/fluffle/.github/actions/runner-upgrade-sdk-candidate@main
        with:
          candidate: ${{ matrix.candidate }}


  summary:
    needs: [sdk-managers-job, ruby-job, java-manager-job, sdk-candidates]
    if: always()
    runs-on: [self-hosted, peep]
    timeout-minutes: 1

    steps:

      - name: Runner Toolchain Summary
        run: |
          {
            echo "## War Canary Summary"
            echo ""
            echo "| Component | Status | Action |"
            echo "|-----------|--------|--------|"
            echo "| SDKMAN | ${{ needs.sdk-managers-job.outputs.sdkman-failed == 'true' && 'X' || '' }} | ${{ needs.sdk-managers-job.outputs.sdkman-upgraded == 'true' && 'upgraded' || '' }} |"
            echo "| Conda | ${{ needs.sdk-managers-job.outputs.conda-failed == 'true' && 'X' || '' }} | ${{ needs.sdk-managers-job.outputs.conda-upgraded == 'true' && 'upgraded' || '' }} |"
            echo "| Ruby | ${{ needs.ruby-job.outputs.failed == 'true' && 'X' || '' }} | |"
            echo "| Java | ${{ needs.java-manager-job.outputs.failed == 'true' && 'X' || '' }} | ${{ needs.java-manager-job.outputs.upgraded == 'true' && 'upgraded' || '' }} |"
            echo ""
          } >> $GITHUB_STEP_SUMMARY
