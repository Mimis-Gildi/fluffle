name: "Stales Labeler"
run-name: "Stale Labeling ${{ github.repository }} by ${{ github.actor }} with ${{ github.event_name }} (Attempt ${{ github.run_attempt }})"

on:
  schedule:
    - cron: '20 10 * * *'
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

defaults:
  run:
    shell: zsh -l {0}


jobs:
  stale-issues-and-pull-requests-check:
    timeout-minutes: 3
    runs-on: self-hosted
    name: "Manage Stale Issues and Pull Requests"

    steps:

      - name: "Run Stale Issues and Pull Requests checks in repository [${{ github.repository }}] by ${{ github.actor }}"
        id: stale-issues-and-pull-requests-check
        uses: actions/stale@v10.2.0
        continue-on-error: true
        with:
          operations-per-run: 200

          days-before-issue-stale: 70
          stale-issue-label: stale-issue
          stale-issue-message: |
            This issue has had no activity for 70 days and is being marked stale.

          days-before-issue-close: 45
          close-issue-label: stale-issue-closed
          close-issue-message: |
            Closing this issue after 45 additional days of inactivity.

          days-before-pr-stale: 11
          stale-pr-label: stale-pr
          stale-pr-message: |
            This pull request has been inactive for 11 days and is being marked stale.

          days-before-pr-close: 15
          close-pr-label: stale-pr-closed
          close-pr-message: |
            Closing this pull request after 15 additional days of inactivity.

          delete-branch: true
          exempt-issue-labels: keep
          exempt-pr-labels: keep
