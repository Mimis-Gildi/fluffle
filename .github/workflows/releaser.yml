name: Publish Release
run-name: "Published on ${{ github.repository }} by ${{ github.actor }} with ${{ github.event_name }} (Attempt ${{ github.run_attempt }})"


on:
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:
    inputs:
      build-tasks:
        required: false
        type: string
        default: 'build'
        description: 'Gradle tasks to run'
      artifacts:
        required: false
        type: string
        default: ''
        description: 'Glob pattern for release artifacts to attach'
      release-title:
        required: false
        type: string
        default: ''
        description: 'Release title (defaults to version tag)'
  workflow_call:
    inputs:
      build-tasks:
        required: false
        type: string
        default: 'build'
      artifacts:
        required: false
        type: string
        default: ''
      release-title:
        required: false
        type: string
        default: ''


permissions:
  contents: write

defaults:
  run:
    shell: zsh -l {0}

jobs:

  release-publish:
    concurrency:
      group: fluffle-releaser-${{ github.ref }}
    name: "Publish Release"
    runs-on: [self-hosted, release]
    timeout-minutes: 15

    steps:

      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Extract version
        id: version-info
        run: |
          if [[ ! -f gradle.properties ]]; then
            echo "::error title=Missing File::gradle.properties not found"
            exit 1
          fi
          VERSION=${${(M)${(f)"$(<gradle.properties)"}:#version=*}#version=}
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error title=Version Invalid::Expected semantic version (X.X.X) in gradle.properties, got '${VERSION:-empty}'"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Extract changelog
        id: changelog
        env:
          VERSION: ${{ steps.version-info.outputs.version }}
        run: |
          BODY=""
          if [[ -f CHANGELOG.md ]]; then
            found=0
            for line in "${(@f)"$(<CHANGELOG.md)"}"; do
              if [[ "$line" == "## ["* ]]; then
                (( found )) && break
                [[ "$line" == *"[${VERSION}]"* ]] && found=1 && continue
              fi
              (( found )) && [[ ! "$line" =~ ^(---+|\*\*\*+|___+)[[:space:]]*$ ]] && BODY+="$line"$'\n'
            done
          fi

          if [[ -z "${BODY//[[:space:]]/}" ]]; then
            echo "::warning title=No Changelog::No changelog entry for v$VERSION. Release will have empty notes."
            BODY=""
          fi

          {
            echo 'body<<EOF_CHANGELOG'
            printf '%s\n' "$BODY"
            echo 'EOF_CHANGELOG'
          } >> $GITHUB_OUTPUT

      - name: Build
        timeout-minutes: 9
        env:
          BUILD_TASKS: ${{ inputs.build-tasks }}
        run: |
          source "$SDKMAN_INIT"
          gradle ${=BUILD_TASKS}

      - name: Create annotated tag
        timeout-minutes: 3
        env:
          TAG: ${{ steps.version-info.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git tag -af "$TAG" -m "$TAG"
          git push origin "$TAG" --force

      - name: Publish Release and Artifacts
        timeout-minutes: 3
        env:
          TAG: ${{ steps.version-info.outputs.tag }}
          ARTIFACTS: ${{ inputs.artifacts }}
          RELEASE_BODY: ${{ steps.changelog.outputs.body }}
          RELEASE_TITLE: ${{ inputs.release-title }}
        run: |
          [[ -z "$RELEASE_TITLE" ]] && RELEASE_TITLE="$TAG"
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" --title "$RELEASE_TITLE" --notes "$RELEASE_BODY"

          if [[ -n "$ARTIFACTS" ]]; then
            setopt local_options NULL_GLOB
            uploaded=0
            for file in $~ARTIFACTS; do
              gh release upload "$TAG" "$file" --clobber || echo "::warning title=Upload Failed::Could not upload $file"
              (( uploaded++ ))
            done
            (( uploaded == 0 )) && echo "::warning title=No Artifacts::No files matched '$ARTIFACTS'"
          fi
