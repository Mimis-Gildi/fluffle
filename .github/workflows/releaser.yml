name: Publish Release
run-name: "Published on ${{ github.repository }} by ${{ github.actor }} with ${{ github.event_name }} (Attempt ${{ github.run_attempt }})"


on:
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:
    inputs:
      build-tasks:
        required: false
        type: string
        default: 'build'
        description: 'Gradle tasks to run'
      artifacts:
        required: false
        type: string
        default: ''
        description: 'JSON array of glob patterns for release artifacts, e.g. ["build/*.pdf"]'
      release-title:
        required: false
        type: string
        default: ''
        description: 'Release title (defaults to version tag)'
  workflow_call:
    inputs:
      build-tasks:
        required: false
        type: string
        default: 'build'
      artifacts:
        required: false
        type: string
        default: ''
      release-title:
        required: false
        type: string
        default: ''


permissions:
  contents: write

defaults:
  run:
    shell: zsh -l {0}

jobs:

  release-publish:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.merged == true }}
#    concurrency:
#      group: fluffle-releaser-${{ github.ref }}
    name: "Publish Release"
    runs-on: [self-hosted, release]
    timeout-minutes: 15

    steps:

      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Extract version
        id: version-info
        run: |
          if [[ ! -f gradle.properties ]]; then
            printf '::error title=Missing File::gradle.properties not found\n'
            exit 1
          fi
          VERSION=${${(M)${(f)"$(<gradle.properties)"}:#version=*}#version=}
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            printf '::error title=Version Invalid::Expected semantic version (X.X.X) in gradle.properties, got %s\n' "${VERSION:-empty}"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Extract changelog
        id: changelog
        env:
          VERSION: ${{ steps.version-info.outputs.version }}
        run: |
          BODY=""
          if [[ -f CHANGELOG.md ]]; then
            found=0
            for line in "${(@f)"$(<CHANGELOG.md)"}"; do
              if [[ "$line" == "## ["* ]]; then
                (( found )) && break
                [[ "$line" == *"[${VERSION}]"* ]] && found=1 && continue
              fi
              (( found )) && [[ ! "$line" =~ ^(---+|\*\*\*+|___+)[[:space:]]*$ ]] && BODY+="$line"$'\n'
            done
          fi

          if [[ -z "${BODY//[[:space:]]/}" ]]; then
            printf '::warning title=No Changelog::No changelog entry for v%s. Release will have empty notes.\n' "$VERSION"
            BODY=""
          fi

          {
            echo 'body<<EOF_CHANGELOG'
            printf '%s\n' "$BODY"
            echo 'EOF_CHANGELOG'
          } >> $GITHUB_OUTPUT

      - name: Build
        timeout-minutes: 9
        env:
          BUILD_TASKS: ${{ inputs.build-tasks }}
        run: |
          source "$SDKMAN_INIT"
          gradle ${=BUILD_TASKS}

      - name: Create annotated tag
        timeout-minutes: 3
        env:
          TAG: ${{ steps.version-info.outputs.tag }}
          GH_TOKEN: ${{ secrets.CI_PAT }}
        run: |
          git config user.name "R!dd13r"
          git config user.email "12781006+rdd13r@users.noreply.github.com"
          
          # This is a very specific local work-around for some agents that run on alternative git implementation.
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git fetch --all && git pull
          git tag -af "$TAG" -m "$TAG"
          git push origin "$TAG" --force

      - name: Publish Release and Artifacts
        timeout-minutes: 3
        env:
          GH_TOKEN: ${{ secrets.CI_PAT }}
          TAG: ${{ steps.version-info.outputs.tag }}
          ARTIFACTS: ${{ inputs.artifacts }}
          RELEASE_BODY: ${{ steps.changelog.outputs.body }}
          RELEASE_TITLE: ${{ inputs.release-title }}
        run: |
          (( $+GITHUB_TOKEN )) && printf 'GITHUB_TOKEN is set!\n' || printf 'GITHUB_TOKEN is NOT set!\n'
          (( $+GH_TOKEN )) && printf 'GH_TOKEN is set!\n' || printf 'GH_TOKEN is NOT set!\n'
          
          [[ -z "$RELEASE_TITLE" ]] && RELEASE_TITLE="$TAG"
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" --title "$RELEASE_TITLE" --notes "$RELEASE_BODY" \
            || { printf '::error title=Release Failed::Could not create release %s\n' "$TAG"; exit 11 }

          if [[ -n "${ARTIFACTS// /}" ]]; then
            # Parse: JSON string → pattern array (fatal if malformed)
            patterns=("${(@f)$(jq -r '.[]' <<< "$ARTIFACTS")}") \
              || { printf '::error title=Bad Artifacts::Cannot parse: %s\n' "$ARTIFACTS"; exit 11 }

            # Resolve: patterns → verified files
            setopt local_options NULL_GLOB
            files=()
            for pattern in ${patterns[@]}; do
              resolved=($~pattern)
              if (( ! ${#resolved} )); then
                printf '::error title=No Match::Pattern matched nothing: %s\n' "$pattern"
                continue
              fi
              for candidate in ${resolved[@]}; do
                [[ -f "$candidate" ]] && files+=("$candidate") \
                  || printf '::error title=Not a File::%s is not a regular file\n' "$candidate"
              done
            done

            # Upload
            for file in ${files[@]}; do
              gh release upload "$TAG" "$file" --clobber || printf '::warning title=Upload Failed::%s\n' "$file"
            done
          fi
