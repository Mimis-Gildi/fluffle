name: Qodana
run-name: "Qodana scan on ${{ github.repository }} by ${{ github.actor }} with ${{ github.event_name }} (Attempt ${{ github.run_attempt }})"

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_call:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  schedule:
    - cron: '19 15 3 * *'

permissions:
  contents: read
  pull-requests: write
  checks: write

defaults:
  run:
    shell: zsh -l {0}

jobs:
  qodana-scan:
    concurrency:
      group: fluffle-qodana-${{ github.ref }}
      cancel-in-progress: true
    runs-on: [self-hosted, qodana]
    timeout-minutes: 77

    steps:

      - name: Checkout full repository
        uses: actions/checkout@v6.0.2
        timeout-minutes: 3
        with:
          fetch-depth: 0

      - name: Run Qodana Scan
        uses: JetBrains/qodana-action@v2025.3.2
        timeout-minutes: 75
        with:
          pr-mode: ${{ github.event_name == 'pull_request' }}
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_695194621 }}
          QODANA_ENDPOINT: 'https://qodana.cloud'
