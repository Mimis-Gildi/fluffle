name: Version on New Branch
run-name: "Incremented Version on ${{ github.repository }} by ${{ github.actor }} with ${{ github.event_name }} (Attempt ${{ github.run_attempt }})"

on:
  push:
    branches-ignore:
      - main
      - release
      - 'releases/**'
      - 'renovate/**'
      - 'dependabot/**'
  create:
    branches:
      - '[0-9]+-**'
  pull_request:
    branches-ignore:
      - main
      - release
      - 'releases/**'
      - 'renovate/**'
      - 'dependabot/**'
    types:
      - opened
      - reopened
  workflow_dispatch:
    inputs:
      force-major:
        required: false
        type: boolean
        default: false
        description: 'Should a global major increment be pushed?'
      force-minor:
        required: false
        type: boolean
        default: false
        description: 'Should a PR increment be forced? force-major trumps this.'
  workflow_call:
    inputs:
      force-major:
        required: false
        type: boolean
        default: false
        description: 'Should a global major increment be pushed'

defaults:
  run:
    shell: zsh -l {0}

jobs:

  increment:
    runs-on: self-hosted
    timeout-minutes: 5
    permissions:
      contents: write
    outputs:
      type: ${{ steps.operation.outputs.type }}
      old: ${{ steps.version.outputs.old }}
      new: ${{ steps.version.outputs.new }}

    steps:

      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0
          fetch-tags: true

      - name: Determine increment type
        id: operation
        run: |
          LAST_MSG=$(git log -1 --format='%s')
          LAST_AUTHOR=$(git log -1 --format='%an')

          TYPE=patch
          [[ "${{ github.event_name }}" == "pull_request" || "${{ inputs.force-minor }}" == "true" || "${LAST_MSG:l}" == *"[push up]"* ]] && TYPE=minor
          [[ "${{ github.event_name }}" == "create" || "${{ inputs.force-major }}" == "true" || "${LAST_MSG:l}" == *"[force up]"* ]] && TYPE=major
          [[ "${LAST_MSG:l}" == *"[skip up]"* || "${LAST_AUTHOR:l}" == *"[bot]"* ]] && TYPE=skip

          printf '::notice title=Increment Type::%s\n' "$TYPE"
          echo "type=$TYPE" >> $GITHUB_OUTPUT

      - name: Calculate and apply version
        id: version
        if: steps.operation.outputs.type != 'skip'
        run: |
          TYPE="${{ steps.operation.outputs.type }}"
          VERSION=$(grep '^version=' gradle.properties | cut -d= -f2)
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          if [[ "$TYPE" == "major" ]]; then
            MAX=$(git log --all --format='%H' | while read sha; do
              git show "${sha}:gradle.properties" 2>/dev/null | grep '^version=' | cut -d= -f2
            done | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
            [[ -n "$MAX" ]] || { echo "::error title=No Versions::No valid version found in history"; exit 1 }
            MAJOR=$(echo "$MAX" | cut -d. -f1)
            printf '::notice title=Max Version Ever::%s\n' "$MAX"
          fi

          case "$TYPE" in
            patch) NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))" ;;
            minor) NEW_VERSION="$MAJOR.$((MINOR + 1)).0" ;;
            major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
          esac

          grep -q "^version=$VERSION$" gradle.properties || { echo "::error title=Version Mismatch::Expected version=$VERSION not found"; exit 1 }
          sed -i "s/^version=$VERSION$/version=$NEW_VERSION/" gradle.properties
          printf '::notice title=%s Bump::%s -> %s\n' "${(C)TYPE}" "$VERSION" "$NEW_VERSION"

          echo "old=$VERSION" >> $GITHUB_OUTPUT
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.version.outputs.new != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add gradle.properties
          git commit -m "${(C)${{ steps.operation.outputs.type }}} ${{ steps.version.outputs.old }} -> ${{ steps.version.outputs.new }}"
          git push origin HEAD

  summarize:
    needs: increment
    if: always()
    runs-on: self-hosted
    timeout-minutes: 1

    steps:

      - name: Summary
        run: |
          TYPE="${{ needs.increment.outputs.type }}"
          OLD="${{ needs.increment.outputs.old }}"
          NEW="${{ needs.increment.outputs.new }}"
          {
            echo "## Version Increment Summary"
            echo ""
            echo "| Type | Version | Branch |"
            echo "|------|---------|--------|"
            [[ -n "$NEW" ]] && echo "| $TYPE | $OLD -> $NEW | ${GITHUB_REF#refs/heads/} |" || echo "| $TYPE | unchanged | ${GITHUB_REF#refs/heads/} |"
          } >> $GITHUB_STEP_SUMMARY
