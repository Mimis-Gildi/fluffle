name: Version on New Branch
run-name: "Incremented Version on ${{ github.repository }} by ${{ github.actor }} with ${{ github.event_name }} (Attempt ${{ github.run_attempt }})"

on:
  push:
    branches-ignore:
      - release
      - 'releases/**'
      - 'renovate/**'
      - 'dependabot/**'
  create:
    branches:
      - '[0-9]+-**'
  pull_request:
    branches-ignore:
      - release
      - 'releases/**'
      - 'renovate/**'
      - 'dependabot/**'
    types:
      - opened
      - reopened
  workflow_dispatch:
    inputs:
      force-major:
        required: false
        type: boolean
        default: false
        description: 'Should a global major increment be pushed?'
      force-minor:
        required: false
        type: boolean
        default: false
        description: 'Should a PR increment be forced? force-major trumps this.'
  workflow_call:
    inputs:
      force-major:
        required: false
        type: boolean
        default: false
        description: 'Should a global major increment be pushed'

defaults:
  run:
    shell: zsh -l {0}

jobs:

  initialize-versioning:
    runs-on: self-hosted
    timeout-minutes: 3
    outputs:
      current: ${{ steps.memoize.outputs.current }}
      type: ${{ steps.operation.outputs.type }}

    permissions:
      contents: read

    steps:

      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Store Current Version
        id: memoize
        run: |
          readonly current=$(grep '^version=' gradle.properties | cut -d= -f2)
          printf '::notice title=Current Version::%s\n' "$current"
          echo "current=$current" >> $GITHUB_OUTPUT

      - name: Calculate Type of Increment
        id: operation
        run: |
          LAST_MSG=$(git log -1 --format='%s')
          LAST_AUTHOR=$(git log -1 --format='%an')
          
          echo "type=patch" > $GITHUB_OUTPUT
          [[ "${{ github.event_name }}" == "pull_request" || "${{ inputs.force-minor }}" == "true" || "${LAST_MSG:l}" == *"[push up]"* ]] && echo "type=minor" > $GITHUB_OUTPUT
          [[ "${{ github.event_name }}" == "create" || "${{ inputs.force-major }}" == "true" || "${LAST_MSG:l}" == *"[force up]"* ]] && echo "type=major" > $GITHUB_OUTPUT

          [[ "${LAST_MSG:l}" == *"[skip up]"* || "${LAST_AUTHOR:l}" == *"[bot]"* ]] && echo "type=skip" > $GITHUB_OUTPUT

          printf '::notice title=Increment Type::%s\n' "$(grep type= $GITHUB_OUTPUT | cut -d= -f2)"


  increment-running:
    needs: initialize-versioning
    if: needs.initialize-versioning.outputs.type == 'patch'
    runs-on: self-hosted
    timeout-minutes: 3
    permissions:
      contents: write
    outputs:
      old: ${{ steps.version-patch.outputs.old }}
      new: ${{ steps.version-patch.outputs.new }}

    steps:

      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Calculate version
        id: version-patch
        run: |
          VERSION="${{ needs.initialize-versioning.outputs.current }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"

          grep -q "^version=$VERSION$" gradle.properties || { echo "::error title=Version Mismatch::Expected version=$VERSION not found"; exit 1 }
          sed -i "s/^version=$VERSION$/version=$NEW_VERSION/" gradle.properties
          printf '::notice title=Patch Bump::%s -> %s\n' "$VERSION" "$NEW_VERSION"

          echo "old=$VERSION" >> $GITHUB_OUTPUT
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and push
        timeout-minutes: 2
        uses: Mimis-Gildi/fluffle/.github/actions/commit-and-push-files@main
        with:
          files: gradle.properties
          message: "Patch ${{ steps.version-patch.outputs.old }} -> ${{ steps.version-patch.outputs.new }}"


  increment-minor:
    needs: initialize-versioning
    if: needs.initialize-versioning.outputs.type == 'minor'
    runs-on: self-hosted
    timeout-minutes: 3
    permissions:
      contents: write
    outputs:
      old: ${{ steps.version-minor.outputs.old }}
      new: ${{ steps.version-minor.outputs.new }}

    steps:

      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Calculate version
        id: version-minor
        run: |
          VERSION="${{ needs.initialize-versioning.outputs.current }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          NEW_VERSION="$MAJOR.$((MINOR + 1)).0"

          grep -q "^version=$VERSION$" gradle.properties || { echo "::error title=Version Mismatch::Expected version=$VERSION not found"; exit 1 }
          sed -i "s/^version=$VERSION$/version=$NEW_VERSION/" gradle.properties
          printf '::notice title=Minor Bump::%s -> %s\n' "$VERSION" "$NEW_VERSION"

          echo "old=$VERSION" >> $GITHUB_OUTPUT
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and push
        timeout-minutes: 2
        uses: Mimis-Gildi/fluffle/.github/actions/commit-and-push-files@main
        with:
          files: gradle.properties
          message: "Minor ${{ steps.version-minor.outputs.old }} -> ${{ steps.version-minor.outputs.new }}"


  increment-major:
    needs: initialize-versioning
    if: needs.initialize-versioning.outputs.type == 'major'
    runs-on: self-hosted
    timeout-minutes: 3
    permissions:
      contents: write
    outputs:
      old: ${{ steps.version-major.outputs.old }}
      new: ${{ steps.version-major.outputs.new }}

    steps:

      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0
          fetch-tags: true

      - name: Find highest version ever used
        id: max
        run: |
          MAX=$(git log --all --format='%H' | while read sha; do
            git show "${sha}:gradle.properties" 2>/dev/null | grep '^version=' | cut -d= -f2
          done | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)

          [[ -n "$MAX" ]] || { echo "::error title=No Versions::No valid version found in history"; exit 1 }
          printf '::notice title=Max Version Ever::%s\n' "$MAX"
          echo "max=$MAX" >> $GITHUB_OUTPUT

      - name: Calculate version
        id: version-major
        run: |
          VERSION="${{ needs.initialize-versioning.outputs.current }}"
          MAJOR=$(echo "${{ steps.max.outputs.max }}" | cut -d. -f1)
          NEW_VERSION="$((MAJOR + 1)).0.0"

          grep -q "^version=$VERSION$" gradle.properties || { echo "::error title=Version Mismatch::Expected version=$VERSION not found"; exit 1 }
          sed -i "s/^version=$VERSION$/version=$NEW_VERSION/" gradle.properties
          printf '::notice title=Major Bump::%s -> %s (max was %s)\n' "$VERSION" "$NEW_VERSION" "${{ steps.max.outputs.max }}"

          echo "old=$VERSION" >> $GITHUB_OUTPUT
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and push
        timeout-minutes: 2
        uses: Mimis-Gildi/fluffle/.github/actions/commit-and-push-files@main
        with:
          files: gradle.properties
          message: "Major ${{ steps.version-major.outputs.old }} -> ${{ steps.version-major.outputs.new }}"

  summarize-increment:
    needs: [initialize-versioning, increment-running, increment-minor, increment-major]
    if: always()
    runs-on: self-hosted
    timeout-minutes: 1

    steps:

      - name: Summary
        run: |
          TYPE="${{ needs.initialize-versioning.outputs.type }}"
          {
            echo "## Version Increment Summary"
            echo ""
            echo "| Type | Version | Branch |"
            echo "|------|---------|--------|"
            echo "| $TYPE | ${{ needs.increment-running.outputs.old }}${{ needs.increment-minor.outputs.old }}${{ needs.increment-major.outputs.old }} -> ${{ needs.increment-running.outputs.new }}${{ needs.increment-minor.outputs.new }}${{ needs.increment-major.outputs.new }} | ${GITHUB_REF#refs/heads/} |"
          } >> $GITHUB_STEP_SUMMARY
