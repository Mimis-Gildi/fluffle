name: Version on New Branch
run-name: "Incremented Version on ${{ github.repository }} by ${{ github.actor }} with ${{ github.event_name }} (Attempt ${{ github.run_attempt }})"

on:
  push:
    branches-ignore:
      - main
      - release
      - 'releases/**'
      - 'renovate/**'
      - 'dependabot/**'
  create:
    branches:
      - '[0-9]+-**'
  pull_request:
    branches-ignore:
      - main
      - release
      - 'releases/**'
      - 'renovate/**'
      - 'dependabot/**'
    types:
      - synchronize
      - opened
      - reopened
  workflow_dispatch:
    inputs:
      force-major:
        required: false
        type: boolean
        default: false
        description: 'Should a global major increment be pushed?'
      force-minor:
        required: false
        type: boolean
        default: false
        description: 'Should a PR increment be forced? force-major trumps this.'
  workflow_call:
    inputs:
      force-major:
        required: false
        type: boolean
        default: false
        description: 'Should a global major increment be pushed'
    outputs:
      type:
        value: ${{ jobs.increment.outputs.type }}
      old:
        value: ${{ jobs.increment.outputs.old }}
      new:
        value: ${{ jobs.increment.outputs.new }}

defaults:
  run:
    shell: zsh -l {0}

# Example for caller.
#concurrency:
#  group: fluffle-incrementer-${{ github.head_ref || github.ref }}
#  cancel-in-progress: true

jobs:

  increment:
    runs-on: self-hosted
    timeout-minutes: 5
    permissions:
      contents: write
    outputs:
      type: ${{ steps.operation.outputs.type }}
      old: ${{ steps.version.outputs.old }}
      new: ${{ steps.version.outputs.new }}

    steps:

      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false


      - name: Determine increment type
        id: operation
        env:
          GH_TOKEN: ${{ secrets.CI_PAT }}
        run: |
          LAST_MSG=$(git log -1 --format='%s')
          LAST_AUTHOR=$(git log -1 --format='%an')

          # Decompose PR_SKIP into its two drivers
          gh pr view &>/dev/null && IN_PR=1 || IN_PR=0
          [[ "push" == "${{ github.event_name }}" ]] && IN_PUSH=1 || IN_PUSH=0
          (( IN_PR && IN_PUSH )) && PR_SKIP=1 || PR_SKIP=0

          # Extract commit message signals
          [[ "${LAST_MSG:l}" == *"[push up]"* ]] && MSG_MINOR=1 || MSG_MINOR=0
          [[ "${LAST_MSG:l}" == *"[force up]"* ]] && MSG_MAJOR=1 || MSG_MAJOR=0
          [[ "${LAST_MSG:l}" == *"[skip up]"* ]] && MSG_SKIP=1 || MSG_SKIP=0
          [[ "${LAST_AUTHOR:l}" == *"[bot]"* ]] && IS_BOT=1 || IS_BOT=0

          (( $+GITHUB_TOKEN )) && printf 'GITHUB_TOKEN is set!\n' || printf 'GITHUB_TOKEN is NOT set!\n'
          (( $+GH_TOKEN )) && printf 'GH_TOKEN is set!\n' || printf 'GH_TOKEN is NOT set!\n'

          # Trace all driving values
          printf '::notice title=Selector State::event=%s; action=${{ github.event.action }}; IN_PR=%s; IN_PUSH=%s; PR_SKIP=%s; MSG_MINOR=%s; MSG_MAJOR=%s; MSG_SKIP=%s; IS_BOT=%s; force_major=${{ inputs.force-major }}; force_minor=${{ inputs.force-minor }}; author=%s; msg=%s\n' \
            "${{ github.event_name }}" "$IN_PR" "$IN_PUSH" "$PR_SKIP" "$MSG_MINOR" "$MSG_MAJOR" "$MSG_SKIP" "$IS_BOT" "$LAST_AUTHOR" "$LAST_MSG"

          # Determine increment type — UNCHANGED LOGIC
          TYPE=patch
          [[ "${{ github.event_name }}" == "pull_request" || "${{ inputs.force-minor }}" == "true" || "${LAST_MSG:l}" == *"[push up]"* ]] && TYPE=minor
          [[ "${{ github.event_name }}" == "create" || "${{ inputs.force-major }}" == "true" || "${LAST_MSG:l}" == *"[force up]"* ]] && TYPE=major
          (( PR_SKIP )) || [[ "${LAST_MSG:l}" == *"[skip up]"* || "${LAST_AUTHOR:l}" == *"[bot]"* ]] && TYPE=skip

          printf '::notice title=Increment Type::%s\n' "$TYPE"
          echo "type=$TYPE" > $GITHUB_OUTPUT

      - name: Calculate and apply version
        id: version
        if: steps.operation.outputs.type != 'skip'
        run: |
          TYPE="${{ steps.operation.outputs.type }}"
          VERSION=$(grep '^version=' gradle.properties | cut -d= -f2)
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          if [[ "$TYPE" == "major" ]]; then
            MAX=$(git log --all --format='%H' | while read sha; do
              git show "${sha}:gradle.properties" 2>/dev/null | grep '^version=' | cut -d= -f2
            done | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
            [[ -n "$MAX" ]] || { echo "::error title=No Versions::No valid version found in history"; exit 1 }
            MAJOR=$(echo "$MAX" | cut -d. -f1)
            printf '::notice title=Max Version Ever::%s\n' "$MAX"
          fi

          case "$TYPE" in
            patch) NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))" ;;
            minor) NEW_VERSION="$MAJOR.$((MINOR + 1)).0" ;;
            major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
          esac

          grep -q "^version=$VERSION$" gradle.properties || { echo "::error title=Version Mismatch::Expected version=$VERSION not found"; exit 1 }
          sed -i "s/^version=$VERSION$/version=$NEW_VERSION/" gradle.properties
          printf '::notice title=%s Bump::%s -> %s\n' "${(C)TYPE}" "$VERSION" "$NEW_VERSION"

          echo "old=$VERSION" >> $GITHUB_OUTPUT
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.version.outputs.new != ''
        env:
          GH_TOKEN: ${{ secrets.CI_PAT }}

        run: |
          git config user.name "R!dd13r"
          git config user.email "12781006+rdd13r@users.noreply.github.com"

          # This is a very specific local work-around for some agents that run on alternative git implementation.
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git add gradle.properties
          git fetch --all && git pull
          git commit -m "${(C)${{ steps.operation.outputs.type }}} ${{ steps.version.outputs.old }} -> ${{ steps.version.outputs.new }} [skip up]"
          git push

  summarize:
    needs: increment
    if: always()
    runs-on: self-hosted
    timeout-minutes: 1

    steps:

      - name: Summary
        run: |
          TYPE="${{ needs.increment.outputs.type }}"
          OLD="${{ needs.increment.outputs.old }}"
          NEW="${{ needs.increment.outputs.new }}"
          {
            echo "## Version Increment Summary"
            echo ""
            echo "| Type | Version | Branch |"
            echo "|------|---------|--------|"
            [[ -n "$NEW" ]] && echo "| $TYPE | $OLD -> $NEW | ${GITHUB_REF#refs/heads/} |" || echo "| $TYPE | unchanged | ${GITHUB_REF#refs/heads/} |"
          } >> $GITHUB_STEP_SUMMARY
