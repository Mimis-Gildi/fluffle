name: Publish Site
run-name: "Publish on ${{ github.repository }} by ${{ github.actor }} with ${{ github.event_name }} (Attempt ${{ github.run_attempt }})"

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

# Example for caller.
#concurrency:
#  group: fluffle-pages-deploy-${{ github.ref }}
#  cancel-in-progress: true

defaults:
  run:
    shell: zsh -l {0}

jobs:

  build-site:
    uses: Mimis-Gildi/fluffle/.github/workflows/pages-build.yml@main
    secrets: inherit
    permissions:
      contents: read


  deploy-to-default-pages:
    runs-on: [ self-hosted, site ]
    timeout-minutes: 3
    needs: build-site
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:

      - name: Publish Pages
        id: deployment
        timeout-minutes: 3
        uses: actions/deploy-pages@v5.0.0
        with:
          artifact_name: github-pages
          reporting_interval: '700'
          error_count: '21'
          timeout: '150000'

