name: Actions Prune
run-name: "Pruned Old Runs on ${{ github.repository }} by ${{ github.actor }} with ${{ github.event_name }} (Attempt ${{ github.run_attempt }})"

on:
  workflow_dispatch:
    inputs:
      keep-last:
        description: "Number of recent items to keep per workflow/key"
        type: string
        required: false
        default: '0'
      stale-minutes:
        description: "Grace window in minutes"
        type: string
        required: false
        default: '0'
      dry-run:
        description: "Log only, do not delete"
        type: string
        required: false
        default: 'true'
  workflow_call:
    inputs:
      keep-last:
        description: "Number of recent items to keep per workflow/key"
        type: string
        required: false
        default: '1'
      stale-minutes:
        description: "Grace window in minutes"
        type: string
        required: false
        default: '5'
      dry-run:
        description: "Log only, do not delete"
        type: string
        required: false
        default: 'false'
  push:

permissions:
  actions: write
  contents: write

defaults:
  run:
    shell: zsh -l {0}

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}-actions-prune"
  cancel-in-progress: false

env:
  PRUNE_KEEP_LAST: ${{ inputs.keep-last || '1' }}
  PRUNE_STALE_MINUTES: ${{ inputs.stale-minutes || '3' }}
  PRUNE_DRY_RUN: ${{ inputs.dry-run || 'false' }}

jobs:

  cleanup-old-action-runs-leaving-one:
    timeout-minutes: 7
    runs-on: self-hosted
    name: "Prune old actions leaving one"

    steps:

      - name: "Checkout repository source code"
        uses: actions/checkout@v6.0.2
        timeout-minutes: 1


      - name: "Cleanup old action runs"
        uses: Mimis-Gildi/fluffle/.github/actions/prune-workflow-runs@main
        timeout-minutes: 5
        with:
          keep-last: ${{ env.PRUNE_KEEP_LAST }}
          stale-minutes: ${{ env.PRUNE_STALE_MINUTES }}
          dry-run: ${{ env.PRUNE_DRY_RUN }}


      - name: "Cleanup orphaned caches"
        if: always()
        uses: Mimis-Gildi/fluffle/.github/actions/prune-workflow-caches@main
        timeout-minutes: 5
        with:
          keep-last: ${{ env.PRUNE_KEEP_LAST }}
          stale-minutes: ${{ env.PRUNE_STALE_MINUTES }}
          dry-run: ${{ env.PRUNE_DRY_RUN }}

