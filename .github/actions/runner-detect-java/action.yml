name: "Detect Java"
description: "Checks active Java version via SDKMAN against floor threshold."
author: "rdd13r"
branding:
  icon: "coffee"
  color: "orange"

outputs:
  failed:
    description: "true if active java is not latest 21-tem"
    value: ${{ steps.detect.outputs.failed }}

runs:
  using: "composite"

  steps:

    - id: detect
      shell: zsh -l {0}
      run: ${{ github.action_path }}/detect-java.sh
