name: Prune Workflow Caches
description: "Prunes stale GitHub Actions caches. On main: keeps the last N per cache key. On feature branches: deletes caches older than the grace window."
author: "rdd13r"
branding:
  icon: "trash-2"
  color: "orange"

inputs:
  keep-last:
    description: "Number of recent caches to keep per key on main"
    required: false
    default: '2'
  stale-minutes:
    description: "Delete caches older than this many minutes (grace window)"
    required: false
    default: '11'
  dry-run:
    description: "When true, log what would be deleted without actually deleting"
    required: false
    default: 'false'
  token:
    description: "GitHub token with actions:write permission"
    required: false
    default: ${{ github.token }}

runs:
  using: "composite"

  steps:

    - id: prune-caches
      shell: zsh -l {0}
      env:
        GH_TOKEN: ${{ inputs.token }}
        KEEP_LAST: ${{ inputs.keep-last }}
        STALE_MINUTES: ${{ inputs.stale-minutes }}
        DRY_RUN: ${{ inputs.dry-run }}
      run: ${{ github.action_path }}/clean-workflow-run-caches.py
