name: Prune Workflow Caches
description: "Deletes stale GitHub Actions caches, keeping only those created within the last few minutes."
author: "VK (rdd13r)"
branding:
  icon: "trash-2"
  color: "orange"

inputs:
  token:
    description: "GitHub token with actions:write permission"
    required: false
    default: ${{ github.token }}

runs:
  using: "composite"

  steps:

    - name: Install GitHub Actions Cache Extension
      shell: zsh -l {0}
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: gh extension install actions/gh-actions-cache 2>/dev/null || true

    - id: prune-caches
      shell: zsh -l {0}
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: ${{ github.action_path }}/clean-workflow-run-caches.sh
