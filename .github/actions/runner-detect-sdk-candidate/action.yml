name: "Detect SDK Candidate"
description: "Checks an SDKMAN candidate's active version against latest available."
author: "rdd13r"
branding:
  icon: "package"
  color: "green"

inputs:
  candidate:
    description: "SDKMAN candidate name (e.g. gradle, kotlin, scala)"
    required: true

outputs:
  failed:
    description: "true if active version is not latest"
    value: ${{ steps.detect.outputs.failed }}

runs:
  using: "composite"

  steps:

    - id: detect
      shell: zsh -l {0}
      run: ${{ github.action_path }}/detect-sdk-candidate.sh ${{ inputs.candidate }}
