name: Prune Workflow Runs
description: "Prunes old workflow runs, keeping the last N per workflow. Branch-scoped on feature branches, all branches on main."
author: "rdd13r"
branding:
  icon: "scissors"
  color: "orange"

inputs:
  keep-last:
    description: "Number of recent runs to keep per workflow"
    required: false
    default: '2'
  stale-minutes:
    description: "On main, delete main AND non-main branch runs older than this many minutes; On another branch, just delete in that branch"
    required: false
    default: '11'
  max-parallel:
    description: "Maximum parallel delete requests"
    required: false
    default: '100'
  dry-run:
    description: "When true, log what would be deleted without actually deleting"
    required: false
    default: 'false'
  token:
    description: "GitHub token with actions:write permission"
    required: false
    default: ${{ github.token }}

runs:
  using: "composite"

  steps:

    - id: prune
      shell: zsh -l {0}
      env:
        GH_TOKEN: ${{ inputs.token }}
        KEEP_LAST: ${{ inputs.keep-last }}
        STALE_MINUTES: ${{ inputs.stale-minutes }}
        DRY_RUN: ${{ inputs.dry-run }}
        MAX_PARALLEL: ${{ inputs.max-parallel }}
      run: ${{ github.action_path }}/clean-workflow-runs.py
