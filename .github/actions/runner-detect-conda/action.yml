name: "Detect Conda"
description: "Detects conda/mamba/python versions in the ml environment against floor thresholds."
author: "rdd13r"
branding:
  icon: "box"
  color: "green"

inputs:
  python-version:
    description: "Minimum expected Python version"
    required: true
  conda-version:
    description: "Minimum expected Conda version"
    required: true
  mamba-version:
    description: "Minimum expected Mamba version"
    required: true

outputs:
  failed:
    description: "true if any version is behind floor"
    value: ${{ steps.detect.outputs.failed }}

runs:
  using: "composite"

  steps:

    - id: detect
      shell: zsh -l {0}
      run: ${{ github.action_path }}/detect-conda.sh ${{ inputs.python-version }} ${{ inputs.conda-version }} ${{ inputs.mamba-version }}
